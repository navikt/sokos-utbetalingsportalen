name: Build & test PR

on:
  pull_request:
    paths-ignore:
      - "**.md"
      - "LICENCE"
      - "CODEOWNERS"
      - ".gitignore"
      - ".github/skills/**"
      - ".github/workflows/codeql-scan.yaml"
      - ".github/workflows/deploy.yaml"
      - '.github/workflows/digestabot-automerge.yaml'
      - '.github/workflows/digestabot-update.yaml'
      - ".github/workflows/manual-deploy.yaml"
      - ".github/dependabot.yaml"
      - ".nais/**"

env:
  TZ: Europe/Oslo

jobs:
  build-test-pr:
    permissions:
      contents: read
    name: Build & test application
    uses: navikt/mob-gha-workflows/.github/workflows/node-build-pr.yaml@dac7a1ac47e76110d90af301b2152057c215c867 # ratchet:navikt/mob-gha-workflows/.github/workflows/node-build-pr.yaml@v1.0.0
    with:
      has-vitest: true
    secrets: inherit
