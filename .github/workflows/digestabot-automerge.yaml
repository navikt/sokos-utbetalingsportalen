name: Digestabot Auto-merge

on:
  workflow_dispatch:
  schedule:
    - cron: "0 5 * * 1"

env:
  TZ: Europe/Oslo

jobs:
  digestabot-automerge:
    permissions:
      contents: read
      pull-requests: write
    uses: navikt/mob-gha-workflows/.github/workflows/digestabot-automerge.yaml@dac7a1ac47e76110d90af301b2152057c215c867 # ratchet:navikt/mob-gha-workflows/.github/workflows/digestabot-automerge.yaml@v1.0.0
    name: Digestabot Auto-merge
    secrets:
      APP_ID: ${{ vars.APP_ID }}
      PRIVATE_KEY: ${{ secrets.PRIVATE_KEY }}
